<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Wedding AR Invitation ✨</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>
body { margin:0; overflow:hidden; font-family:sans-serif; }

.ui {
  position: fixed;
  bottom: 20px;
  left: 20px;
  right: 20px;
  background: rgba(0,0,0,0.7);
  color: #ffd700;
  padding: 12px;
  border-radius: 12px;
  text-align: center;
  z-index: 10;
}
</style>
</head>

<body>

<div class="ui" id="uiText">📷 Scan the invitation</div>

<a-scene
mindar-image="imageTargetSrc: markers/targets.mind; autoStart: true; detectionThreshold: 0.5;"
renderer="colorManagement: true; physicallyCorrectLights: true;"
vr-mode-ui="enabled:false"
device-orientation-permission-ui="enabled:false"
embedded>

<a-assets>
<video id="vid" src="videos/invitation.mp4" preload="auto" playsinline muted></video>
</a-assets>

<a-camera position="0 0 0" look-controls="enabled:false"></a-camera>

<a-entity mindar-image-target="targetIndex:0" id="target">

<!-- VIDEO -->
<a-plane id="video"
scale="0.1 0.1 0.1"
material="shader: flat; src: #vid;">
</a-plane>

<!-- GLOW FRAME -->
<a-plane 
position="0 0 -0.01"
width="1.1"
height="0.65"
color="#ffd700"
material="opacity:0.25; transparent:true">
</a-plane>

</a-entity>

</a-scene>

<script>
// ==========================
// AUTO VIDEO RATIO
// ==========================
const video = document.querySelector("#vid");
const plane = document.querySelector("#video");

video.addEventListener("loadedmetadata", () => {
  const ratio = video.videoWidth / video.videoHeight;
  plane.setAttribute("width", 1);
  plane.setAttribute("height", 1 / ratio);
});

// ==========================
// PREMIUM EFFECTS
// ==========================

// HEART PARTICLES
AFRAME.registerComponent("hearts", {
  init() {
    for (let i = 0; i < 12; i++) {
      const heart = document.createElement("a-sphere");
      heart.setAttribute("radius", 0.03);
      heart.setAttribute("color", "#ff4d6d");
      heart.setAttribute("position", `${(Math.random()-0.5)} ${(Math.random()-0.5)} 0`);
      heart.setAttribute("animation", {
        property: "position",
        to: `${(Math.random()-0.5)} ${Math.random()+1} 0`,
        dur: 2000 + Math.random()*1000,
        loop: true
      });
      this.el.appendChild(heart);
    }
  }
});

// CONFETTI BURST
function confetti(target) {
  for (let i = 0; i < 20; i++) {
    const p = document.createElement("a-sphere");
    p.setAttribute("radius", 0.02);
    p.setAttribute("color", ["#ffd700","#ff4d6d","#ffffff"][i%3]);
    p.setAttribute("position", "0 0 0");
    p.setAttribute("animation", {
      property: "position",
      to: `${(Math.random()-0.5)*2} ${Math.random()*2} ${(Math.random()-0.5)}`,
      dur: 800
    });
    target.appendChild(p);
    setTimeout(()=>p.remove(),1000);
  }
}

// ==========================
// MAIN CONTROLLER
// ==========================

const target = document.querySelector("#target");
const ui = document.getElementById("uiText");

let started = false;

target.addEventListener("targetFound", () => {
  ui.innerHTML = "💖 Tap to play with sound";

  // scale animation
  plane.setAttribute("animation", {
    property: "scale",
    to: "1 1 1",
    dur: 500,
    easing: "easeOutBack"
  });

  video.play();

  // effects
  target.setAttribute("hearts", "");
  confetti(target);

  started = true;
});

target.addEventListener("targetLost", () => {
  ui.innerHTML = "📷 Scan again";
  video.pause();
});

// TAP TO ENABLE SOUND
document.body.addEventListener("click", () => {
  if (started) {
    video.muted = false;
    video.play();
    ui.innerHTML = "✨ Enjoy your invitation ✨";
  }
});

</script>

</body>
</html>
