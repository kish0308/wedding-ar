<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Wedding AR Invitation</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>
body { margin:0; overflow:hidden; font-family:sans-serif; }
#ui {
  position: fixed;
  bottom: 20px;
  left: 20px;
  right: 20px;
  background: rgba(0,0,0,0.7);
  color: #ffd700;
  padding: 12px;
  border-radius: 12px;
  text-align: center;
  z-index: 10;
}
</style>
</head>

<body>

<div id="ui">📷 Point camera at the invitation</div>

<a-scene
mindar-image="imageTargetSrc: markers/targets.mind; autoStart: true; detectionThreshold: 0.5;"
renderer="colorManagement: true; physicallyCorrectLights: true;"
vr-mode-ui="enabled:false"
device-orientation-permission-ui="enabled:false"
embedded>

<a-assets>
<video
  id="vid"
  src="videos/invitation.mp4"
  preload="auto"
  autoplay
  loop
  muted
  playsinline
  webkit-playsinline
  crossorigin="anonymous"
  style="display:none">
</video>
</a-assets>

<a-camera position="0 0 0" look-controls="enabled:false"></a-camera>

<a-entity mindar-image-target="targetIndex:0" id="target">

<a-plane
  id="videoPlane"
  position="0 0 0"
  width="1"
  height="0.6"
  material="shader: flat; src: #vid;">
</a-plane>

<!-- glow frame -->
<a-plane
  position="0 0 -0.01"
  width="1.05"
  height="0.65"
  color="#ffd700"
  material="opacity:0.25; transparent:true">
</a-plane>

</a-entity>

</a-scene>

<script>
const video = document.querySelector("#vid");
const plane = document.querySelector("#videoPlane");
const target = document.querySelector("#target");
const ui = document.getElementById("ui");

// =======================
// FORCE TEXTURE FIX
// =======================
function forceTexture() {
  plane.setAttribute("material", "src", "#vid");
}

// =======================
// AUTO RATIO FIX
// =======================
video.addEventListener("loadedmetadata", () => {
  const ratio = video.videoWidth / video.videoHeight;
  plane.setAttribute("width", 1);
  plane.setAttribute("height", 1 / ratio);
});

// =======================
// TARGET EVENTS
// =======================
target.addEventListener("targetFound", async () => {
  console.log("TARGET FOUND");

  ui.innerHTML = "💖 Tap screen for sound";

  try {
    video.currentTime = 0;
    await video.play();

    // force render fix
    forceTexture();
    setTimeout(forceTexture, 100);
    setTimeout(forceTexture, 300);

  } catch (e) {
    console.log("Autoplay blocked");

    document.body.addEventListener("click", () => {
      video.play();
      forceTexture();
    }, { once: true });
  }
});

target.addEventListener("targetLost", () => {
  video.pause();
  ui.innerHTML = "📷 Scan invitation again";
});

// =======================
// TAP TO ENABLE SOUND
// =======================
document.body.addEventListener("click", () => {
  if (video.paused === false) {
    video.muted = false;
    video.play();
    ui.innerHTML = "✨ Enjoy your invitation ✨";
  }
});

// =======================
// DEBUG CHECKS
// =======================
video.addEventListener("error", () => {
  ui.innerHTML = "❌ Video not found (check /videos folder)";
});

fetch("markers/targets.mind")
.then(r => {
  if (!r.ok) {
    ui.innerHTML = "❌ targets.mind missing";
  }
})
.catch(() => {
  ui.innerHTML = "❌ cannot load targets.mind";
});

</script>

</body>
</html>
