<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Wedding AR Invitation - Fixed Video Display</title>
  
  <!-- A-Frame + MindAR -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #000;
    }
    
    .instruction-panel {
      position: fixed;
      bottom: 20px;
      left: 20px;
      right: 20px;
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 16px 20px;
      color: white;
      text-align: center;
      z-index: 100;
      pointer-events: none;
      border: 1px solid rgba(255, 215, 0, 0.4);
    }
    
    .instruction-panel h3 {
      color: #ffd966;
      margin-bottom: 8px;
      font-size: 18px;
    }
    
    .instruction-panel p {
      font-size: 13px;
      opacity: 0.95;
    }
    
    .status {
      position: fixed;
      top: 20px;
      left: 20px;
      right: 20px;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(8px);
      border-radius: 12px;
      padding: 10px 16px;
      color: #ffd966;
      font-size: 12px;
      font-weight: 500;
      z-index: 100;
      text-align: center;
      border-left: 3px solid #ffd966;
      pointer-events: none;
    }
    
    @media (min-width: 768px) {
      .instruction-panel { left: auto; right: 20px; bottom: 20px; max-width: 340px; text-align: left; }
      .status { left: auto; right: 20px; top: 20px; left: 20px; text-align: left; max-width: 400px; }
    }
  </style>
</head>
<body>

  <div class="status" id="statusMessage">
    🔍 Initializing AR camera...
  </div>
  
  <div class="instruction-panel">
    <h3>✨ Wedding AR Invitation ✨</h3>
    <p id="instructionText">📱 Point camera at the reference image</p>
  </div>

  <a-scene
    id="scene"
    mindar-image="imageTargetSrc: markers/targets.mind; autoStart: true; detectionThreshold: 0.75; showDebug: false;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    renderer="colorManagement: true; physicallyCorrectLights: true;"
    embedded>
    
    <!-- Basic Lighting -->
    <a-light type="ambient" intensity="1.2"></a-light>
    <a-light type="directional" intensity="1.5" position="1 2 1.5"></a-light>
    
    <!-- Camera -->
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
    
    <!-- Video Asset -->
    <a-assets>
      <video 
        id="invitationVideo"
        src="videos/invitation.mp4"
        preload="auto"
        playsinline
        webkit-playsinline
        muted="false"
        loop="false"
        crossorigin="anonymous">
      </video>
    </a-assets>
    
    <!-- Target Entity -->
    <a-entity 
      id="targetEntity"
      mindar-image-target="targetIndex: 0">
      
      <!-- TEST PLANE FIRST - To verify tracking works -->
      <a-plane
        id="testPlane"
        position="0 0 -0.01"
        width="1.6"
        height="1.0"
        color="#ff0000"
        material="opacity: 0.5; transparent: true">
      </a-plane>
      
      <!-- VIDEO PLANE - Fixed version -->
      <a-plane
        id="videoPlane"
        position="0 0 0"
        width="1.6"
        height="1.0"
        material="shader: flat; src: #invitationVideo; transparent: false; side: double;"
        video-fix>
      </a-plane>
      
      <!-- Gold Frame -->
      <a-plane
        position="0 0 -0.005"
        width="1.64"
        height="1.04"
        color="#ffd700"
        material="opacity: 0.4; transparent: true; metalness: 0.8">
      </a-plane>
      
    </a-entity>
  </a-scene>

  <script>
    // ============================================
    // FIXED VIDEO HANDLER - ENSURES VIDEO DISPLAYS
    // ============================================
    
    AFRAME.registerComponent("video-fix", {
      init: function() {
        this.video = document.querySelector("#invitationVideo");
        this.videoPlane = this.el;
        this.testPlane = document.querySelector("#testPlane");
        this.isVisible = false;
        
        // Force video settings
        this.video.playsInline = true;
        this.video.setAttribute('playsinline', '');
        this.video.setAttribute('webkit-playsinline', '');
        this.video.muted = false;
        
        // Initial state
        this.video.pause();
        this.video.currentTime = 0;
        
        // Get target entity
        this.targetEl = this.el.parentElement;
        
        // Create a canvas texture as fallback
        this.canvas = document.createElement('canvas');
        this.ctx = this.canvas.getContext('2d');
        this.useCanvasFallback = false;
        
        // Listen to target events
        this.targetEl.addEventListener("targetFound", () => {
          console.log("🎯 Target detected!");
          this.isVisible = true;
          document.getElementById("statusMessage").innerHTML = "🎬 Loading video...";
          document.getElementById("instructionText").innerHTML = "🎉 Video invitation loading... 🎉";
          this.playVideoWithFallback();
        });
        
        this.targetEl.addEventListener("targetLost", () => {
          console.log("Target lost");
          this.isVisible = false;
          this.pauseVideo();
          document.getElementById("statusMessage").innerHTML = "🔍 Scan target again";
          document.getElementById("instructionText").innerHTML = "📱 Point camera at the reference image";
          // Hide test plane
          if (this.testPlane) {
            this.testPlane.setAttribute("visible", "false");
          }
        });
        
        // Start canvas fallback render loop
        this.startCanvasRender();
      },
      
      playVideoWithFallback: function() {
        if (!this.video) return;
        
        // Reset video
        this.video.currentTime = 0;
        this.video.load();
        
        // Try standard playback
        const playPromise = this.video.play();
        
        if (playPromise !== undefined) {
          playPromise.then(() => {
            console.log("✅ Video playing normally");
            this.updateUIForPlaying();
            
            // Hide test plane after video works
            if (this.testPlane) {
              setTimeout(() => {
                if (this.testPlane) this.testPlane.setAttribute("visible", "false");
              }, 500);
            }
            
          }).catch(err => {
            console.error("Standard playback failed:", err);
            console.log("🔄 Activating canvas fallback mode");
            this.useCanvasFallback = true;
            this.updateUIForPlaying();
            
            // Try to play video anyway for audio
            this.video.play().catch(e => console.log("Audio may be muted"));
          });
        }
      },
      
      startCanvasRender: function() {
        // Continuously draw video to canvas and update texture
        const renderLoop = () => {
          if (this.useCanvasFallback && this.isVisible && this.video && this.video.readyState >= 2) {
            // Draw video frame to canvas
            if (this.video.videoWidth > 0 && this.video.videoHeight > 0) {
              this.canvas.width = this.video.videoWidth;
              this.canvas.height = this.video.videoHeight;
              this.ctx.drawImage(this.video, 0, 0, this.canvas.width, this.canvas.height);
              
              // Update plane texture with canvas
              this.videoPlane.setAttribute('material', 'src', this.canvas);
            }
          }
          requestAnimationFrame(renderLoop);
        };
        renderLoop();
      },
      
      pauseVideo: function() {
        if (this.video && !this.video.paused) {
          this.video.pause();
        }
        if (this.testPlane) {
          this.testPlane.setAttribute("visible", "true");
          this.testPlane.setAttribute("color", "#00ff00");
          setTimeout(() => {
            if (this.testPlane && !this.isVisible) {
              this.testPlane.setAttribute("visible", "false");
            }
          }, 2000);
        }
      },
      
      updateUIForPlaying: function() {
        document.getElementById("statusMessage").innerHTML = "🎬 VIDEO PLAYING 🎬";
        document.getElementById("statusMessage").style.borderLeftColor = "#4caf50";
        document.getElementById("instructionText").innerHTML = "✨ Watch your invitation video! ✨";
      }
    });
    
    // ============================================
    // DIRECT TEXTURE UPDATE APPROACH (Plan B)
    // ============================================
    
    // Force material update when video plays
    const videoElement = document.querySelector("#invitationVideo");
    const videoPlane = document.querySelector("#videoPlane");
    
    if (videoElement && videoPlane) {
      videoElement.addEventListener('playing', () => {
        console.log("Video playing event - forcing texture update");
        // Force multiple texture updates
        setTimeout(() => {
          videoPlane.setAttribute('material', 'src', '#invitationVideo');
        }, 10);
        setTimeout(() => {
          videoPlane.setAttribute('material', 'src', '#invitationVideo');
        }, 100);
        setTimeout(() => {
          videoPlane.setAttribute('material', 'src', '#invitationVideo');
        }, 500);
      });
      
      videoElement.addEventListener('loadeddata', () => {
        console.log("Video data loaded - updating texture");
        videoPlane.setAttribute('material', 'src', '#invitationVideo');
      });
    }
    
    // ============================================
    // CHECK FILES AND INITIALIZE
    // ============================================
    
    const scene = document.querySelector("#scene");
    const statusDiv = document.getElementById("statusMessage");
    
    // Check if .mind file exists
    fetch('markers/targets.mind', { method: 'HEAD' })
      .then(response => {
        if (response.ok) {
          console.log('✅ targets.mind found');
          statusDiv.innerHTML = "📷 Ready - Scan reference image";
        } else {
          statusDiv.innerHTML = "⚠️ Missing markers/targets.mind";
          document.getElementById("instructionText").innerHTML = "❌ Place markers/targets.mind file";
        }
      })
      .catch(() => {
        statusDiv.innerHTML = "⚠️ Create markers/targets.mind first";
      });
    
    // Check video file
    if (videoElement) {
      videoElement.addEventListener('error', () => {
        console.error('Video file not found');
        document.getElementById("instructionText").innerHTML = "⚠️ Place video in videos/invitation.mp4";
        statusDiv.innerHTML = "⚠️ Video file missing";
      });
    }
    
    // MindAR ready
    scene.addEventListener('mindar-image-start', () => {
      console.log('MindAR ready');
      statusDiv.innerHTML = "🎯 Scan your reference image";
    });
    
    // Unlock audio on first touch
    const unlockAudio = () => {
      if (videoElement) {
        videoElement.load();
      }
      document.body.removeEventListener('touchstart', unlockAudio);
      document.body.removeEventListener('mousedown', unlockAudio);
    };
    document.body.addEventListener('touchstart', unlockAudio, { once: true });
    document.body.addEventListener('mousedown', unlockAudio, { once: true });
    
    console.log("AR Invitation Ready - Video display fix applied");
  </script>
</body>
</html>
