<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.4/dist/mindar-image-aframe.prod.js"></script>
</head>

<body>
  <a-scene mindar-image="imageTargetSrc: targets.mind;" 
           color-space="sRGB" 
           embedded 
           vr-mode-ui="enabled: false" 
           device-orientation-permission-ui="enabled: true">

    <a-assets>
      <video id="vid" src="video.mp4" preload="auto" loop="true"></video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">
      <a-video src="#vid" width="1" height="0.6" position="0 0 0"></a-video>
    </a-entity>

  </a-scene>

  <script>
    const video = document.querySelector("#vid");

    document.querySelector("a-scene").addEventListener("targetFound", () => {
      video.play();
    });

    document.querySelector("a-scene").addEventListener("targetLost", () => {
      video.pause();
    });
  </script>
</body>
</html>
