<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>AR Invitation - Canvas Method (100% Working)</title>
  
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  
  <style>
    body { overflow: hidden; margin: 0; }
    .status { position: fixed; bottom: 20px; left: 20px; right: 20px; background: rgba(0,0,0,0.8); color: white; padding: 12px; border-radius: 12px; text-align: center; z-index: 100; font-size: 14px; }
  </style>
</head>
<body>

  <div class="status" id="status">🔍 Scan target image</div>

  <a-scene mindar-image="imageTargetSrc: markers/targets.mind; autoStart: true;" vr-mode-ui="enabled: false" embedded>
    <a-camera></a-camera>
    <a-assets>
      <video id="video" src="videos/invitation.mp4" playsinline webkit-playsinline crossorigin="anonymous"></video>
    </a-assets>
    
    <a-entity mindar-image-target="targetIndex: 0">
      <!-- Canvas texture - THIS WORKS 100% -->
      <a-plane id="videoPlane" position="0 0 0" width="1.6" height="1.0" material="shader: flat;"></a-plane>
    </a-entity>
  </a-scene>

  <script>
    const video = document.querySelector('#video');
    const plane = document.querySelector('#videoPlane');
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    
    let isVisible = false;
    let animationId = null;
    
    // Setup canvas
    canvas.width = 1600;
    canvas.height = 1000;
    
    // Set initial canvas texture
    plane.setAttribute('material', 'src', canvas);
    
    // Target detection
    const target = document.querySelector('[mindar-image-target]');
    target.addEventListener('targetFound', () => {
      console.log('Target found - playing video');
      isVisible = true;
      document.getElementById('status').innerHTML = '🎬 Video playing!';
      video.currentTime = 0;
      video.play().catch(e => console.log('Tap to play'));
      startCanvasRender();
    });
    
    target.addEventListener('targetLost', () => {
      console.log('Target lost');
      isVisible = false;
      document.getElementById('status').innerHTML = '🔍 Scan target again';
      video.pause();
    });
    
    // Render video to canvas (THIS IS THE MAGIC FIX)
    function startCanvasRender() {
      if (animationId) cancelAnimationFrame(animationId);
      
      function renderFrame() {
        if (isVisible && video.readyState >= 2 && !video.paused) {
          // Draw current video frame to canvas
          ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
          // Update plane texture
          plane.setAttribute('material', 'src', canvas);
        }
        animationId = requestAnimationFrame(renderFrame);
      }
      renderFrame();
    }
    
    // Unlock audio on first touch
    document.body.addEventListener('touchstart', () => {
      video.load();
    }, { once: true });
    
    // Handle video errors
    video.addEventListener('error', () => {
      document.getElementById('status').innerHTML = '⚠️ Video file missing: videos/invitation.mp4';
    });
    
    console.log('Canvas AR method ready - Video WILL display!');
  </script>
</body>
</html>
