<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Wedding AR Invitation</title>
  <!-- Import A-Frame and MindAR -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <style>
    body { margin: 0; overflow: hidden; font-family: Arial, Helvetica, sans-serif; }
    #status-msg {
      position: fixed; bottom: 20px; left: 20px; right: 20px;
      background: rgba(0,0,0,0.7); color: white; text-align: center;
      padding: 12px; border-radius: 30px; z-index: 100; font-size: 14px;
      pointer-events: none; backdrop-filter: blur(5px);
    }
  </style>
</head>
<body>
  <div id="status-msg">🔍 Initializing... Point camera at the target image.</div>

  <a-scene mindar-image="imageTargetSrc: markers/targets.mind; autoStart: true; detectionThreshold: 0.75;"
          vr-mode-ui="enabled: false"
          device-orientation-permission-ui="enabled: false"
          embedded>
    
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- Target Entity: The image to track -->
    <a-entity mindar-image-target="targetIndex: 0">
      
      <!-- !!! TEST PLANE !!! -->
      <!-- If you see a RED SQUARE over your target image, tracking works! -->
      <a-plane position="0 0 -0.01" width="1.6" height="1.0" color="red" material="transparent: false"></a-plane>
      
      <!-- Your actual content (video or GIF). Replace the src with your file. -->
      <!-- <a-plane position="0 0 0" width="1.6" height="1.0" material="shader: flat; src: #yourVideoOrGif;"></a-plane> -->

      <!-- Decorative Frame -->
      <a-plane position="0 0 -0.005" width="1.64" height="1.04" color="gold" material="opacity: 0.4; transparent: true"></a-plane>
    </a-entity>
  </a-scene>

  <script>
    const targetEntity = document.querySelector('[mindar-image-target]');
    const statusMsg = document.getElementById('status-msg');
    const testPlane = document.querySelector('#testPlane'); // Add id="testPlane" to the red plane above

    if (targetEntity) {
      targetEntity.addEventListener('targetFound', () => {
        statusMsg.innerHTML = '🎯 Target detected! (Red square should be visible)';
        statusMsg.style.backgroundColor = 'rgba(0,0,0,0.8)';
        console.log('Target found!');
      });
      targetEntity.addEventListener('targetLost', () => {
        statusMsg.innerHTML = '🔍 Target lost. Scan again.';
        statusMsg.style.backgroundColor = 'rgba(0,0,0,0.7)';
        console.log('Target lost.');
      });
    }

    // Check for the .mind file and update status
    fetch('markers/targets.mind', { method: 'HEAD' })
      .then(res => { if (!res.ok) throw new Error(); })
      .catch(() => statusMsg.innerHTML = '❌ ERROR: "markers/targets.mind" file missing. Please create it.');

    console.log('AR Scene Ready. Waiting for camera and target...');
  </script>
</body>
</html>
