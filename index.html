<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>AR Invitation - Simple Working Version</title>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js"></script>
  <style>
    body { margin: 0; overflow: hidden; background: #000; }
    #container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; }
    .ar-video {
      position: absolute;
      display: none;
      width: 300px;
      border: 3px solid gold;
      border-radius: 12px;
      z-index: 100;
    }
    .status {
      position: fixed;
      bottom: 20px;
      left: 20px;
      right: 20px;
      background: black;
      color: gold;
      padding: 15px;
      text-align: center;
      border-radius: 12px;
      z-index: 200;
      font-family: Arial;
    }
  </style>
</head>
<body>
  <div id="container"></div>
  <video id="arVideo" class="ar-video" src="videos/invitation.mp4" playsinline webkit-playsinline></video>
  <div class="status" id="status">🔍 Scanning for target image...</div>

  <script>
    const video = document.getElementById('arVideo');
    const statusDiv = document.getElementById('status');
    
    // Initialize MindAR
    const mindar = new MindAR.Image({
      container: document.querySelector('#container'),
      imageTargetSrc: 'markers/targets.mind'
    });
    
    mindar.start();
    
    // Track target
    mindar.addTargetEventListener((event) => {
      if (event.detail.status === 'found') {
        console.log('Target found!');
        statusDiv.innerHTML = '🎬 Video Playing! 🎬';
        statusDiv.style.color = '#4caf50';
        
        // Get target position and show video
        const target = event.detail.target;
        video.style.display = 'block';
        
        // Update video position based on target
        function updatePosition() {
          if (target.position) {
            const x = (target.position[0] / target.position[2]) * 200 + window.innerWidth / 2;
            const y = (target.position[1] / target.position[2]) * 200 + window.innerHeight / 2;
            video.style.left = (x - 150) + 'px';
            video.style.top = (y - 100) + 'px';
          }
          if (mindar.isTracking) {
            requestAnimationFrame(updatePosition);
          }
        }
        
        updatePosition();
        
        // Play video
        video.currentTime = 0;
        video.play().catch(e => {
          statusDiv.innerHTML = '👆 Tap screen to play';
          document.body.onclick = () => video.play();
        });
        
      } else if (event.detail.status === 'lost') {
        console.log('Target lost');
        statusDiv.innerHTML = '🔍 Scan target image again';
        statusDiv.style.color = 'gold';
        video.style.display = 'none';
        video.pause();
      }
    });
    
    // Check for files
    fetch('markers/targets.mind', { method: 'HEAD' })
      .then(r => r.ok ? null : Promise.reject())
      .catch(() => statusDiv.innerHTML = '❌ Missing markers/targets.mind file');
    
    // Unlock audio
    document.body.addEventListener('touchstart', () => video.load(), { once: true });
  </script>
</body>
</html>
