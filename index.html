<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.4/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body { margin: 0; overflow: hidden; }

    #btn {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 14px 24px;
      font-size: 18px;
      background: black;
      color: white;
      border-radius: 10px;
      z-index: 999;
    }
  </style>
</head>

<body>

<button id="btn">Start AR</button>

<a-scene
  mindar-image="imageTargetSrc: ./targets.mind; autoStart: false;"
  embedded
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: true"
>

  <a-assets>
    <video id="vid" src="video.mp4" muted playsinline loop></video>
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity mindar-image-target="targetIndex: 0">
    <a-video src="#vid" width="1" height="0.6"></a-video>
  </a-entity>

</a-scene>

<script>
  const btn = document.getElementById("btn");
  const scene = document.querySelector("a-scene");
  const video = document.getElementById("vid");

  btn.addEventListener("click", async () => {
    btn.style.display = "none";

    try {
      await scene.systems["mindar-image-system"].start();
    } catch (e) {
      alert("AR failed to start. Check targets.mind file.");
      console.error(e);
    }
  });

  scene.addEventListener("targetFound", () => video.play());
  scene.addEventListener("targetLost", () => video.pause());
</script>

</body>
</html>
