<!DOCTYPE html>
<html>
<head>
  <title>MindAR Invitation</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <!-- MindAR A-Frame -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
    }
  </style>

  <script>
    AFRAME.registerComponent("video-controller", {
      init: function () {
        this.video = document.querySelector("#video");
        this.video.pause();
      },

      tick: function () {
        const marker = this.el;

        if (marker.getAttribute("visible")) {
          if (this.video.paused) {
            this.video.play();
          }
        } else {
          this.video.pause();
          this.video.currentTime = 0;
        }
      }
    });
  </script>
</head>

<body>

<!-- IMPORTANT: MindAR Scene -->
<a-scene
  mindar-image="imageTargetSrc: markers/targets.mind; autoStart: true;"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
  renderer="colorManagement: true, physicallyCorrectLights">

  <!-- Assets -->
  <a-assets>
    <video
      id="video"
      src="videos/invitation.mp4"
      loop="false"
      playsinline
      webkit-playsinline
      crossorigin="anonymous">
    </video>
  </a-assets>

  <!-- LIGHT (important for visibility) -->
  <a-light type="ambient" intensity="1"></a-light>

  <!-- CAMERA -->
  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <!-- TARGET 1 -->
  <a-entity mindar-image-target="targetIndex: 0" video-controller>
    <a-plane
      position="0 0 0"
      width="1"
      height="0.6"
      rotation="0 0 0"
      material="src:#video; transparent:true">
    </a-plane>
  </a-entity>

</a-scene>

</body>
</html>
