<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Wedding AR Invitation - Mobile Fixed</title>
  
  <!-- A-Frame + MindAR -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #000;
    }
    
    .instruction-panel {
      position: fixed;
      bottom: 20px;
      left: 20px;
      right: 20px;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 16px;
      color: white;
      text-align: center;
      z-index: 100;
      pointer-events: none;
      border: 1px solid rgba(255,215,0,0.3);
    }
    
    .instruction-panel h3 {
      color: #ffd966;
      margin-bottom: 8px;
      font-size: 16px;
    }
    
    .instruction-panel p {
      font-size: 13px;
      opacity: 0.9;
    }
    
    .status {
      position: fixed;
      top: 20px;
      left: 20px;
      right: 20px;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      border-radius: 12px;
      padding: 10px 16px;
      color: #ffd966;
      font-size: 12px;
      font-family: monospace;
      z-index: 100;
      text-align: center;
      border-left: 3px solid #ffd966;
      pointer-events: none;
    }
    
    @media (min-width: 768px) {
      .instruction-panel { left: auto; right: 20px; bottom: 20px; max-width: 320px; text-align: left; }
      .status { left: auto; right: 20px; top: 20px; left: 20px; text-align: left; }
    }
  </style>
</head>
<body>

  <div class="status" id="statusMessage">
    🔍 Initializing AR camera...
  </div>
  
  <div class="instruction-panel">
    <h3>✨ Wedding AR Invitation ✨</h3>
    <p id="instructionText">Point camera at the reference image → Video will appear</p>
  </div>

  <a-scene
    id="scene"
    mindar-image="imageTargetSrc: markers/targets.mind; autoStart: true; detectionThreshold: 0.75; showDebug: false;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    renderer="colorManagement: true; physicallyCorrectLights: true; alpha: false;"
    embedded>
    
    <!-- Lighting -->
    <a-light type="ambient" intensity="1.0"></a-light>
    <a-light type="directional" intensity="1.5" position="1 2 1.5"></a-light>
    
    <!-- Camera -->
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
    
    <!-- Video Asset with proper mobile attributes -->
    <a-assets>
      <video 
        id="invitationVideo"
        src="videos/invitation.mp4"
        preload="auto"
        playsinline
        webkit-playsinline
        autoplay="false"
        muted="false"
        loop="false"
        crossorigin="anonymous">
      </video>
    </a-assets>
    
    <!-- Target Entity - Fixed video display -->
    <a-entity 
      id="targetEntity"
      mindar-image-target="targetIndex: 0">
      
      <!-- VIDEO PLANE - Fixed for mobile display -->
      <a-plane
        id="videoPlane"
        position="0 0 0"
        width="1.6"
        height="1.0"
        material="shader: flat; src: #invitationVideo; transparent: false; side: double;"
        video-mobile-handler>
      </a-plane>
      
      <!-- Decorative border -->
      <a-plane
        position="0 0 -0.005"
        width="1.64"
        height="1.04"
        color="#ffd700"
        material="opacity: 0.4; transparent: true; metalness: 0.8; roughness: 0.3"
        side="double">
      </a-plane>
      
    </a-entity>
  </a-scene>

  <script>
    // FIXED VIDEO HANDLER FOR MOBILE
    AFRAME.registerComponent("video-mobile-handler", {
      init: function() {
        this.video = document.querySelector("#invitationVideo");
        if (!this.video) {
          console.error("Video element not found!");
          return;
        }
        
        // Force video texture update
        this.video.crossOrigin = "anonymous";
        this.video.playsInline = true;
        this.video.setAttribute('playsinline', '');
        this.video.setAttribute('webkit-playsinline', '');
        
        // Initialize video state
        this.video.pause();
        this.video.currentTime = 0;
        this.isVisible = false;
        this.videoTexture = null;
        
        // Get the material and force texture refresh
        this.el.addEventListener('materialtextureloaded', () => {
          console.log("Texture loaded");
        });
        
        // Get parent target entity
        this.targetEl = this.el.parentElement;
        
        // Target detection events
        this.targetEl.addEventListener("targetFound", () => {
          console.log("🎯 Target detected!");
          this.isVisible = true;
          this.updateStatus("🎬 Video playing!", "#4caf50");
          this.playVideoWithTexture();
        });
        
        this.targetEl.addEventListener("targetLost", () => {
          console.log("Target lost");
          this.isVisible = false;
          this.updateStatus("🔍 Target lost - scan again", "#ffd966");
          this.pauseVideo();
        });
        
        // Force material update every frame when visible
        this.tick = AFRAME.utils.throttleTick(this.tick, 100, this);
      },
      
      playVideoWithTexture: function() {
        if (!this.video) return;
        
        // Reset to beginning
        this.video.currentTime = 0;
        
        // CRITICAL: Force reload of texture material
        const material = this.el.getAttribute('material');
        if (material) {
          // Refresh material to ensure video texture updates
          this.el.setAttribute('material', {
            src: '#invitationVideo',
            shader: 'flat',
            transparent: false,
            side: 'double'
          });
        }
        
        // Play video with promise handling
        const playPromise = this.video.play();
        if (playPromise !== undefined) {
          playPromise.then(() => {
            console.log("✅ Video playing and visible on screen");
            this.updateInstruction("🎉 Video invitation playing! 🎉");
            
            // Force another texture update after play starts
            setTimeout(() => {
              if (this.isVisible) {
                this.el.setAttribute('material', 'src', '#invitationVideo');
              }
            }, 50);
          }).catch(err => {
            console.error("Autoplay error:", err);
            this.updateStatus("⚠️ Tap screen to play video", "#ff9800");
            this.waitForUserTap();
          });
        }
      },
      
      pauseVideo: function() {
        if (this.video && !this.video.paused) {
          this.video.pause();
          this.updateInstruction("Point camera at the reference image → Video will appear");
        }
      },
      
      tick: function() {
        // Force texture update while video is playing and visible
        if (this.isVisible && this.video && !this.video.paused) {
          // This trick forces A-Frame to refresh the video texture
          const material = this.el.getAttribute('material');
          if (material && material.src) {
            // No operation - just accessing forces refresh
          }
        }
      },
      
      waitForUserTap: function() {
        const handler = () => {
          if (this.isVisible && this.video && this.video.paused) {
            this.playVideoWithTexture();
          }
          document.body.removeEventListener('touchstart', handler);
          document.body.removeEventListener('mousedown', handler);
        };
        document.body.addEventListener('touchstart', handler, { once: true });
        document.body.addEventListener('mousedown', handler, { once: true });
      },
      
      updateStatus: function(message, color) {
        const statusDiv = document.getElementById("statusMessage");
        if (statusDiv) {
          statusDiv.innerHTML = message;
          statusDiv.style.borderLeftColor = color || "#ffd966";
        }
      },
      
      updateInstruction: function(message) {
        const instructionP = document.getElementById("instructionText");
        if (instructionP) {
          instructionP.innerHTML = message;
        }
      }
    });
    
    // Mobile-specific: Ensure video texture updates continuously
    const scene = document.querySelector("#scene");
    const statusDiv = document.getElementById("statusMessage");
    
    // Check if .mind file exists
    fetch('markers/targets.mind', { method: 'HEAD' })
      .then(response => {
        if (response.ok) {
          console.log('✅ targets.mind file found');
          statusDiv.innerHTML = "📷 Camera ready - Scan your reference image";
        } else {
          statusDiv.innerHTML = "⚠️ Missing targets.mind file";
        }
      })
      .catch(error => {
        console.error('❌ targets.mind not found');
        statusDiv.innerHTML = "⚠️ Place markers/targets.mind file";
      });
    
    // Handle camera initialization
    scene.addEventListener('mindar-image-start', () => {
      console.log('MindAR started');
      statusDiv.innerHTML = "🎯 Camera ready - Point at your reference image";
    });
    
    scene.addEventListener('mindar-image-error', (e) => {
      console.error('MindAR error:', e.detail);
      statusDiv.innerHTML = "⚠️ Camera error - check permissions";
    });
    
    // Force video element to be interactive
    const video = document.querySelector("#invitationVideo");
    if (video) {
      video.addEventListener('loadeddata', () => {
        console.log("Video data loaded");
      });
      
      video.addEventListener('error', (e) => {
        console.error('Video load error');
        document.getElementById("instructionText").innerHTML = "⚠️ Place video in 'videos/invitation.mp4'";
      });
      
      // Unlock audio/video on first touch
      const unlockVideo = () => {
        video.load();
        document.body.removeEventListener('touchstart', unlockVideo);
        document.body.removeEventListener('mousedown', unlockVideo);
      };
      document.body.addEventListener('touchstart', unlockVideo, { once: true });
      document.body.addEventListener('mousedown', unlockVideo, { once: true });
    }
    
    console.log("AR Ready - Mobile video fix applied");
  </script>
</body>
</html>
